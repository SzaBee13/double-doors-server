name: Crowdin Translation Sync

on:
  push:
    branches:
      - main
    paths:
      - core/src/main/resources/lang/en_US.json
      - .crowdin.yml
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose which Crowdin action to run"
        required: true
        default: "both"
        type: choice
        options:
          - upload
          - download
          - both
  schedule:
    - cron: '0 4 * * 1' # Run every Monday at 4 AM

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: crowdin-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upload-sources:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'upload' || github.event.inputs.mode == 'both'))
    runs-on:
      - ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
  
      - name: Upload source strings to Crowdin
        uses: crowdin/github-action@v2
        with:
          config: .crowdin.yml
          upload_sources: true
          upload_translations: true
          upload_translations_args: '--auto-approve-imported --import-eq-suggestions'
          download_translations: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ vars.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
  
  download-translations:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'download' || github.event.inputs.mode == 'both'))
    runs-on:
      - ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
    
      - name: Download translated files from Crowdin
        id: download
        uses: crowdin/github-action@v2
        with:
          config: .crowdin.yml
          upload_sources: false
          upload_translations: false
          download_translations: true
          skip_untranslated_strings: false
          create_pull_request: true
          localization_branch_name: crowdin_translations_${{ github.run_number }}
          pull_request_title: 'Crowdin Translations #${{ github.run_number }}'
          pull_request_body: 'Crowdin translations by Crowdin GitHub Action'
          pull_request_base_branch_name: 'dev'
          pull_request_labels: translation
          pull_request_assignees: SzaBee13
          commit_message: "Crowdin translations by GitHub Action"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ vars.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Check diff for translations
        id: diff
        run: |
          git fetch origin dev
          CHANGED=$(git diff --name-only origin/dev...HEAD -- core/src/main/resources/lang/*.json |
            grep -oE '[a-z]{2}_[A-Z]{2}' |
            sort -u |
            paste -sd "," -)
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Edit Pull Request description with changed languages
        if: steps.diff.outputs.changed != '' && steps.download.outputs.pull_request_number != ''
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = parseInt('${{ steps.download.outputs.pull_request_number }}', 10);
            const changed = '${{ steps.diff.outputs.changed }}';
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const newBody = (pr.body || '') + `\n\nUpdated translations for: ${changed}`;
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: newBody
            });
