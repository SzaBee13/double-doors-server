name: Crowdin Translation Sync

on:
  push:
    branches:
      - main
    paths:
      - core/src/main/resources/lang/en_US.json
      - .crowdin.yml
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose which Crowdin action to run"
        required: true
        default: "both"
        type: choice
        options:
          - upload
          - download
          - both
  schedule:
    - cron: '0 4 * * 1' # Run every Monday at 4 AM

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: crowdin-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upload-sources:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'upload' || github.event.inputs.mode == 'both'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
  
      - name: Prepare locale aliases for Crowdin upload
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "core/src/main/resources/lang/es_409.json" ] && [ ! -f "core/src/main/resources/lang/es_419.json" ]; then
            cp "core/src/main/resources/lang/es_409.json" "core/src/main/resources/lang/es_419.json"
            echo "DD_TEMP_ES_419=1" >> "$GITHUB_ENV"
          fi
  
      - name: Upload source strings to Crowdin
        uses: crowdin/github-action@v2
        with:
          config: .crowdin.yml
          upload_sources: true
          upload_translations: true
          upload_translations_args: '--auto-approve-imported --import-eq-suggestions'
          download_translations: false
          project_id: ${{ vars.CROWDIN_PROJECT_ID }}
          token: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Cleanup locale aliases
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if [ "${DD_TEMP_ES_419:-0}" = "1" ]; then
            rm -f "core/src/main/resources/lang/es_419.json"
          fi
  
  download-translations:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'download' || github.event.inputs.mode == 'both'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
    
      - name: Download translated files from Crowdin
        uses: crowdin/github-action@v2
        with:
          config: .crowdin.yml
          upload_sources: false
          upload_translations: false
          download_translations: true
          skip_untranslated_strings: true
          project_id: ${{ vars.CROWDIN_PROJECT_ID }}
          token: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize locale aliases
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "core/src/main/resources/lang/es_419.json" ]; then
            mv -f "core/src/main/resources/lang/es_419.json" "core/src/main/resources/lang/es_409.json"
          fi

      - name: Create pull request for translation updates
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/crowdin-sync
          delete-branch: true
          add-paths: |
            core/src/main/resources/lang/*.json
          commit-message: "chore(i18n): sync translations from Crowdin"
          title: "chore(i18n): sync translations from Crowdin"
          body: |
            Automated translation sync from Crowdin.
            This PR was created by the Crowdin workflow.
          labels: |
            translation
