name: Publish Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (for example: v1.2.3)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: ./gradlew build

      - name: Get Bukkit JAR path
        id: bukkit_artifact
        run: |
          JAR_PATH=$(find bukkit/build/libs -maxdepth 1 -name "doubledoors-bukkit-*.jar" -not -name "*sources*" -not -name "*javadoc*" | head -n 1)

          if [ -z "$JAR_PATH" ]; then
            echo "Could not find a publishable Bukkit JAR." >&2
            echo "Contents of bukkit/build/libs:" >&2
            ls -la bukkit/build/libs >&2 || true
            exit 1
          fi

          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Get Velocity JAR path
        id: proxy_artifact
        run: |
          PROXY_JAR_PATH=$(find velocity/build/libs -maxdepth 1 -name "doubledoors-velocity-*.jar" -not -name "*sources*" -not -name "*javadoc*" | head -n 1)

          if [ -z "$PROXY_JAR_PATH" ]; then
            echo "Could not find a publishable Velocity JAR." >&2
            echo "Contents of velocity/build/libs:" >&2
            ls -la velocity/build/libs >&2 || true
            exit 1
          fi

          echo "jar_path=$PROXY_JAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Get Paper JAR path
        id: paper_artifact
        run: |
          PAPER_JAR_PATH=$(find paper/build/libs -maxdepth 1 -name "doubledoors-paper-*.jar" -not -name "*sources*" -not -name "*javadoc*" | head -n 1)

          if [ -z "$PAPER_JAR_PATH" ]; then
            echo "Could not find a publishable Paper JAR." >&2
            echo "Contents of paper/build/libs:" >&2
            ls -la paper/build/libs >&2 || true
            exit 1
          fi

          echo "jar_path=$PAPER_JAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Attach JAR to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.release.tag_name }}
          files: |
            ${{ steps.bukkit_artifact.outputs.jar_path }}
            ${{ steps.paper_artifact.outputs.jar_path }}
            ${{ steps.proxy_artifact.outputs.jar_path }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Extract version
        id: version
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Detect release channel
        id: release_channel
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.release.tag_name }}
          IS_PRERELEASE: ${{ github.event_name == 'release' && github.event.release.prerelease || 'false' }}
        run: |
          TAG_LOWER="$(printf '%s' "$TAG_NAME" | tr '[:upper:]' '[:lower:]')"
          VERSION_TYPE="release"

          if [[ "$TAG_LOWER" == *"alpha"* ]]; then
            VERSION_TYPE="alpha"
          elif [[ "$TAG_LOWER" == *"beta"* ]]; then
            VERSION_TYPE="beta"
          elif [[ "$IS_PRERELEASE" == "true" ]]; then
            VERSION_TYPE="beta"
          fi

          echo "version_type=$VERSION_TYPE" >> "$GITHUB_OUTPUT"

      - name: Get release notes
        id: release_notes
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.release.tag_name }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          VERSION="$VERSION"
          VERSION_BASE="${VERSION%%-*}"
          VERSION_SUFFIX="${VERSION#"$VERSION_BASE"}"
          VERSION_SUFFIX="${VERSION_SUFFIX#-}"
          MAJOR="${VERSION_BASE%%.*}"
          REST="${VERSION_BASE#*.}"
          MINOR="${REST%%.*}"
          PATCH="${REST#*.}"
          RELEASE_NOTE_FILE="releases/v${MAJOR}/${MINOR}/${PATCH}/RELEASE-NOTE.md"
          if [ -n "$VERSION_SUFFIX" ] && [ -f "releases/v${MAJOR}/${MINOR}/${PATCH}/${VERSION_SUFFIX}.md" ]; then
            RELEASE_NOTE_FILE="releases/v${MAJOR}/${MINOR}/${PATCH}/${VERSION_SUFFIX}.md"
          fi
          DELIMITER="RELEASE_NOTES_$(date +%s%N)"

          if [ -f "$RELEASE_NOTE_FILE" ] && [ -s "$RELEASE_NOTE_FILE" ]; then
            BODY="$(cat "$RELEASE_NOTE_FILE")"
          elif [ -n "$RELEASE_BODY" ]; then
            BODY="$RELEASE_BODY"
          else
            BODY="Release ${RELEASE_TAG}"
          fi

          {
            echo "body<<$DELIMITER"
            printf '%s\n' "$BODY"
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Packages
        run: ./gradlew publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Define game versions
        id: game_versions
        run: |
          cat << 'EOF' >> "$GITHUB_OUTPUT"
          versions<<GAME_VERSIONS
          1.21
          1.21.1
          1.21.2
          1.21.3
          1.21.4
          1.21.5
          1.21.6
          1.21.7
          1.21.8
          1.21.9
          1.21.10
          1.21.11
          26.1
          26.1.1
          26.1.2
          26.2
          GAME_VERSIONS
          EOF

      - name: Publish Bukkit to CurseForge
        uses: Kira-NT/mc-publish@v3.3
        with:
          curseforge-id: ${{ vars.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: ${{ steps.bukkit_artifact.outputs.jar_path }}
          name: 'Double Doors Server ${{ steps.version.outputs.version }}'
          version: ${{ steps.version.outputs.version }}
          version-type: ${{ steps.release_channel.outputs.version_type }}
          changelog: ${{ steps.release_notes.outputs.body }}
          fail-mode: warn # CurseForge may not support the latest version of minecraft.
          loaders: |
            bukkit
            paper
            purpur
            spigot
            folia
          game-versions: ${{ steps.game_versions.outputs.versions }}
          java: |
            25
          game-version-filter: none
      
      - name: Publish Bukkit and Spigot to Modrinth
        uses: Kira-NT/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: ${{ steps.bukkit_artifact.outputs.jar_path }}
          name: 'Double Doors Bukkit ${{ steps.version.outputs.version }}'
          version: 'bukkit-v${{ steps.version.outputs.version }}'
          version-type: ${{ steps.release_channel.outputs.version_type }}
          changelog: ${{ steps.release_notes.outputs.body }}
          loaders: |
            bukkit
            spigot
          game-versions: ${{ steps.game_versions.outputs.versions }}
          java: |
            25
          game-version-filter: none

      - name: Publish Paper, Purpur, and Folia to Modrinth
        uses: Kira-NT/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: ${{ steps.paper_artifact.outputs.jar_path }}
          name: 'Double Doors Paper ${{ steps.version.outputs.version }}'
          version: 'paper-v${{ steps.version.outputs.version }}'
          version-type: ${{ steps.release_channel.outputs.version_type }}
          changelog: ${{ steps.release_notes.outputs.body }}
          loaders: |
            paper
            purpur
            folia
          game-versions: ${{ steps.game_versions.outputs.versions }}
          java: |
            25
          game-version-filter: none

      - name: Publish Velocity To Modrinth
        uses: Kira-NT/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: ${{ steps.proxy_artifact.outputs.jar_path }}
          name: 'Double Doors Velocity ${{ steps.version.outputs.version }}'
          version: 'velocity-v${{ steps.version.outputs.version }}'
          version-type: ${{ steps.release_channel.outputs.version_type }}
          changelog: 'Velocity for Double Doors Server ${{ steps.version.outputs.version }}. more details below'
          loaders: |
            velocity
          game-versions: ${{ steps.game_versions.outputs.versions }}
          java: |
            25
          game-version-filter: none
        
      - name: Publish to PaperMC Hangar
        uses: milkdrinkers/Hangar-Publish@v2.2.0
        with:
          api_token: ${{ secrets.PAPERMC_API_TOKEN }}
          slug: ${{ vars.PAPERMC_SLUG }}
          version: 'v${{ steps.version.outputs.version }}'
          channel: ${{ steps.release_channel.outputs.version_type }}
          files: |
            [
              {
                "path": "${{ steps.paper_artifact.outputs.jar_path }}",
                "platforms": ["PAPER", "FOLIA"]
              },
              {
                "path": "${{ steps.proxy_artifact.outputs.jar_path }}",
                "platforms": ["VELOCITY"]
              }
            ]
          description: ${{ steps.release_notes.outputs.body }}
          plugin_dependencies: |
            {
              "PAPER": [
                {
                  "name": "Geyser",
                  "required": false
                },
                {
                  "name": "Floodgate",
                  "required": false
                },
                {
                  "name": "GriefPrevention",
                  "required": false
                }
              ],
              "VELOCITY": [
                {
                  "name": "Geyser",
                  "required": false
                },
                {
                  "name": "Floodgate",
                  "required": false
                }
              ]
            }
          platform_dependencies: |
            {
              "PAPER": ["1.21.x", "26.1.x", "26.2.x"],
              "VELOCITY": [">=3.4"]
            }
