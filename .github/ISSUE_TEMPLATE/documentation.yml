name: Documentation improvement
description: Improvements or additions to documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: Which file/page needs updates?
      placeholder: README.md section "Config", wiki page "Permissions", etc.
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current issue
      description: What is missing, confusing, or incorrect?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Suggested improvement
      description: How should it be documented instead?
    validations:
      required: true
