name: Duplicate report
description: This issue or pull request appears to already exist.
title: "[Duplicate]: "
labels:
  - duplicate
body:
  - type: input
  id: existing_reference
  attributes:
    label: Existing issue/PR reference
    description: Link the existing issue or pull request.
    placeholder: https://github.com/<owner>/<repo>/issues/123
  validations:
    required: true
  - type: textarea
  id: note
  attributes:
    label: Notes
    description: Optional details about why this is a duplicate.
